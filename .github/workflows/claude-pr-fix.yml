name: Claude PR Fix

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  call-pr-fix:
    if: >-
      github.repository_owner == 'viamrobotics' &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude-fix')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude-fix'))
      )
    # viamrobotics/claude-ci-workflows@v1.10.6
    uses: viamrobotics/claude-ci-workflows/.github/workflows/claude-pr-fix.yml@918148a29da73235a7d751a93912aeaea0320b04
    with:
      install_command: npm ci && make build-buf
      allowed_tools: 'Edit,Read,Write,Glob,Grep,Bash(make *),Bash(git config *),Bash(git add *),Bash(git commit *),Bash(git push *),Bash(git status*),Bash(git diff*),Bash(git log*),Bash(git checkout *),Bash(git branch *),Bash(git rev-parse *),Bash(git fetch *),Bash(gh pr comment*),Bash(gh pr view*),Bash(gh pr diff*)'
      extra_prompt: |
        - Run `make lint` and `make test` to verify your fix before committing. Fix any errors.
      extra_system_prompt: |
        Use make targets for build, lint, test, and format (e.g., `make build`, `make lint`, `make test`, `make format`).
        Do NOT run e2e tests — they require infrastructure not available here.
        verbatimModuleSyntax is enabled — type-only imports MUST use the type keyword (e.g., import type { Options } from '../../types').
        Strict TypeScript checks enabled: noUncheckedIndexedAccess, strict, noUnusedLocals, noUnusedParameters.
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GIT_ACCESS_TOKEN: ${{ secrets.GIT_ACCESS_TOKEN }}
