name: Claude CI Fix

on:
  workflow_run:
    workflows: ["Pull Request Update"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Failed workflow run ID (from gh run list)'
        required: true
      branch:
        description: 'PR branch name (e.g., claude/SDK-123)'
        required: true

jobs:
  call-ci-fix:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'failure' &&
        startsWith(github.event.workflow_run.head_branch, 'claude/')
      )
    # viamrobotics/claude-ci-workflows@v1.10.6
    uses: viamrobotics/claude-ci-workflows/.github/workflows/claude-ci-fix.yml@918148a29da73235a7d751a93912aeaea0320b04
    with:
      run_id: ${{ github.event.workflow_run.id || inputs.run_id }}
      branch: ${{ github.event.workflow_run.head_branch || inputs.branch }}
      install_command: npm ci && make build-buf
      allowed_tools: 'Edit,Read,Write,Glob,Grep,Bash(make *),Bash(git config *),Bash(git add *),Bash(git commit *),Bash(git push *),Bash(git status*),Bash(git diff*),Bash(git log*),Bash(git checkout *),Bash(git branch *),Bash(git rev-parse *),Bash(git fetch *)'
      team_mention: '@viamrobotics/sdk'
      extra_prompt: |
        - Run `make lint` and `make test` to verify your fix before committing. Fix any errors.
      extra_system_prompt: |
        Use make targets for build, lint, test, and format (e.g., `make build`, `make lint`, `make test`, `make format`).
        Do NOT run e2e tests — they require infrastructure not available here.
        verbatimModuleSyntax is enabled — type-only imports MUST use the type keyword (e.g., import type { Options } from '../../types').
        Strict TypeScript checks enabled: noUncheckedIndexedAccess, strict, noUnusedLocals, noUnusedParameters.
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GIT_ACCESS_TOKEN: ${{ secrets.GIT_ACCESS_TOKEN }}
